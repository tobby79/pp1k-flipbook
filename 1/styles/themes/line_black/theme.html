<div tabindex="0" class="toast">
  <!-- 북 컨테이너 -->
  <div class="book-container">
    <!-- 북 배경 -->
    <div class="book-bg" data-offset-left="25" data-offset-right="25" data-offset-top="10" data-offset-bottom="10">
      <div class="book-bg-page"></div>
      <div class="book-bg-page"></div>
      <div class="book-bg-page"></div>
    </div><!--// 북 배경 -->
    <!-- 북 -->
    <div class="book"></div>
  </div><!--// 북 컨테이너 -->

  <!-- 하단 바 -->
  <aside class="controlbar" role="toolbar">
    <div class="translucent"></div>
    <div class="btn-toolbar">
      <div class="btn-group navigate" role="group">
        <button tabindex="0" command="firstPage" type="button" class="btn" title="{{Strings.FIRST_PAGE}}">
          <img class="icon svg-icon" src="{{theme.baseURL}}icons/first.svg">
        </button>
        <button tabindex="0" command="previousPage" type="button" class="btn" title="{{Strings.PREVIOUS_PAGE}}">
          <img class="icon svg-icon" src="{{theme.baseURL}}icons/previous.svg">
        </button>
        <button tabindex="0" command="moveToUserInputPage" type="button" class="btn btn-pagelabel" title="{{Strings.CURRENT_PAGE}}">
          <div class="label-group">
            <span class="label-page"></span>
            <input type="text" class="form-control input-page">
          </div>
        </button>
        <button tabindex="0" command="nextPage" type="button" class="btn" title="{{Strings.NEXT_PAGE}}">
          <img class="icon svg-icon" src="{{theme.baseURL}}icons/next.svg">
        </button>
        <button tabindex="0" command="lastPage" type="button" class="btn" title="{{Strings.LAST_PAGE}}">
          <img class="icon svg-icon" src="{{theme.baseURL}}icons/last.svg">
        </button>
      </div>
      <div class="btn-group pull-right" role="group">
        <button tabindex="0" command="thumbnail" type="button" class="btn" title="{{Strings.THUMBNAIL}}">
          <img class="icon svg-icon" src="{{theme.baseURL}}icons/thumbnail.svg">
        </button>
        <button tabindex="0" command="toggleDoublePage" type="button" class="btn" title="{{Strings.TOGGLE_DOUBLE_PAGE}}">
          <img class="icon svg-icon off" src="{{theme.baseURL}}icons/single-page.svg">
          <img class="icon svg-icon on" src="{{theme.baseURL}}icons/double-page.svg">
        </button>
      </div>
    </div>
  </aside><!--// 하단 바 -->
  
  <!-- 사이드 페이지 네비게이트 버튼 -->
  <div class="side-page-navigate-buttons">
    <button tabindex="0" class="btn btn-side-previous-page" command="previousPage" title="{{Strings.PREVIOUS_PAGE}}">
      <img class="icon svg-icon" src="{{theme.baseURL}}icons/side_previous.svg">
    </button>
    <button tabindex="0" class="btn btn-side-next-page" command="nextPage" title="{{Strings.NEXT_PAGE}}">
      <img class="icon svg-icon" src="{{theme.baseURL}}icons/side_next.svg">
    </button>
  </div><!--// 사이드 페이지 네비게이트 버튼 -->
  
   
</div>
